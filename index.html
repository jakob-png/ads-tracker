<!DOCTYPE html>
<html lang="sv">
<head>

  <script>
    tailwind.config = {

        extend: {
          fontFamily: { sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'] },
          colors: {
            meta: '#0668E1',

            surface: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1' },

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { height: 100%; }
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; background: #f8fafc; -webkit-font-smoothing: antialiased; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    .kanban-card { cursor: grab; }
    .kanban-card:active { cursor: grabbing; opacity: 0.7; }
    .drag-over { border: 2px dashed #6366f1 !important; background: #eef2ff !important; }
    .glass { background: rgba(255,255,255,0.7); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    .card-hover { transition: all 0.2s ease; }
    .card-hover:hover { transform: translateY(-2px); box-shadow: 0 8px 25px -5px rgba(0,0,0,0.08); }
    .gradient-brand { background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #a78bfa 100%); }
    .gradient-success { background: linear-gradient(135deg, #10b981 0%, #34d399 100%); }
    .gradient-warning { background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%); }
    .gradient-meta { background: linear-gradient(135deg, #0668E1 0%, #4f93e8 100%); }
    .gradient-dark { background: linear-gradient(180deg, #0f0e2a 0%, #1e1b4b 100%); }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.4s ease-out; }
    .pulse-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.5; }
    input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }
    .nav-item { position: relative; }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%); width: 3px; height: 60%; background: #818cf8; border-radius: 0 3px 3px 0; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    const { useState, useEffect, useReducer, createContext, useContext, useRef, useMemo, useCallback } = React;
    const { PieChart, Pie, Cell, BarChart, Bar, XAxis, YAxis, Tooltip: RTooltip, ResponsiveContainer, LineChart, Line, CartesianGrid, AreaChart, Area } = Recharts;

    // ─── Helpers ───
    const uid = () => crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2) + Date.now().toString(36);
    const MONTHS_SV = ['jan','feb','mar','apr','maj','jun','jul','aug','sep','okt','nov','dec'];
    const MONTHS_FULL = ['Januari','Februari','Mars','April','Maj','Juni','Juli','Augusti','September','Oktober','November','December'];
    const DAYS_SV = ['Mån','Tis','Ons','Tor','Fre','Lör','Sön'];

    const fmtDateSv = (d) => { if (!d) return '—'; const dt = new Date(d); return `${dt.getDate()} ${MONTHS_SV[dt.getMonth()]} ${dt.getFullYear()}`; };
    const fmtSEK = (n) => { if (n == null || n === 0) return '0 SEK'; return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + ' SEK'; };
    const fmtSEKShort = (n) => { if (n >= 1000) return Math.round(n/1000) + 'k'; return n + ''; };
    const fmtInputDate = (d) => { if (!d) return ''; const dt = new Date(d); return dt.toISOString().split('T')[0]; };

    const STATUSES = ['Draft','Scheduled','Active','Paused','Completed'];
    const PLATFORMS = ['Meta','TikTok'];
    const CREATIVE_TYPES = ['Video','Image','Carousel'];
    const BUDGET_TYPES = ['daily','total'];

    const STATUS_COLORS = {
      Draft: { bg: 'bg-gray-100', text: 'text-gray-600', dot: 'bg-gray-400', hex: '#9ca3af', light: '#f3f4f6' },
      Scheduled: { bg: 'bg-indigo-50', text: 'text-indigo-700', dot: 'bg-indigo-500', hex: '#6366f1', light: '#eef2ff' },
      Active: { bg: 'bg-emerald-50', text: 'text-emerald-700', dot: 'bg-emerald-500', hex: '#10b981', light: '#ecfdf5' },
      Paused: { bg: 'bg-amber-50', text: 'text-amber-700', dot: 'bg-amber-500', hex: '#f59e0b', light: '#fffbeb' },
      Completed: { bg: 'bg-slate-100', text: 'text-slate-600', dot: 'bg-slate-400', hex: '#64748b', light: '#f1f5f9' },
    };

    const CLIENT_COLORS = ['#6366f1','#ec4899','#f97316','#14b8a6','#8b5cf6','#ef4444','#06b6d4','#84cc16'];

    // ─── Icons ───
    const I = {
      Dashboard: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>,
      Ads: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>,
      Calendar: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
      Clients: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>,
      Plus: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
      Search: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
      ChevL: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
      ChevR: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
      Trash: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,
      X: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
      Table: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>,
      Kanban: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="5" height="18" rx="1"/><rect x="10" y="3" width="5" height="12" rx="1"/><rect x="17" y="3" width="5" height="15" rx="1"/></svg>,
      TrendUp: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>,
      Wallet: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><rect x="1" y="5" width="22" height="16" rx="2"/><path d="M1 10h22"/><circle cx="18" cy="15" r="1"/></svg>,
      ArrowBack: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>,
      Zap: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>,
      Eye: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>,
      Clock: ({s=16}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
      Bell: ({s=18}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>,
      Sparkle: ({s=20}) => <svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 5.5L19 10l-5.5 1.5L12 17l-1.5-5.5L5 10l5.5-1.5L12 3z"/></svg>,
    };

    // ─── Seed Data ───
    const createSeedData = () => {
      const ads = [
        { clientName: "Bram's Burgers", adName: "Fredagsdeal – 2 för 1", platform: "Meta", status: "Active", scheduledDate: "2026-01-15", endDate: "2026-02-15", budgetType: "daily", budgetAmount: 500, creativeType: "Image", notes: "Kampanj för fredagslunch. Målgrupp: 18-35 i Uppsala." },
        { clientName: "Bram's Burgers", adName: "Ny meny launch", platform: "Meta", status: "Completed", scheduledDate: "2026-01-08", endDate: "2026-01-22", budgetType: "total", budgetAmount: 8000, creativeType: "Video", notes: "Videokampanj för nya menyn. UGC-stil." },
        { clientName: "Bram's Burgers", adName: "Valentine's Special", platform: "TikTok", status: "Active", scheduledDate: "2026-02-10", endDate: "2026-02-16", budgetType: "total", budgetAmount: 5000, creativeType: "Video", notes: "Par-deal för alla hjärtans dag." },
        { clientName: "Bram's Burgers", adName: "Sommar-special TikTok", platform: "TikTok", status: "Scheduled", scheduledDate: "2026-04-01", endDate: "2026-04-30", budgetType: "daily", budgetAmount: 300, creativeType: "Video", notes: "Sommarkampanj med influencer-samarbete." },
        { clientName: "Bram's Burgers", adName: "Lunchkampanj Mars", platform: "Meta", status: "Active", scheduledDate: "2026-03-01", endDate: "2026-03-31", budgetType: "total", budgetAmount: 6000, creativeType: "Carousel", notes: "Karusell med alla lunchrätter." },
        { clientName: "Bram's Burgers", adName: "Grand Opening Uppsala", platform: "Meta", status: "Draft", scheduledDate: "2026-04-15", endDate: null, budgetType: "total", budgetAmount: 15000, creativeType: "Video", notes: "Stor kampanj för nya restaurangen." },
        { clientName: "Bram's Burgers", adName: "Retargeting – webbbesökare", platform: "Meta", status: "Paused", scheduledDate: "2026-02-01", endDate: "2026-03-01", budgetType: "daily", budgetAmount: 200, creativeType: "Image", notes: "Retargeting-kampanj. Pausad pga budget." },
        { clientName: "Bram's Burgers", adName: "TikTok Behind the Grill", platform: "TikTok", status: "Completed", scheduledDate: "2026-01-20", endDate: "2026-02-05", budgetType: "total", budgetAmount: 3500, creativeType: "Video", notes: "Bakom kulisserna-innehåll." },
        { clientName: "Kebab Dudes", adName: "Kebab Fredag Kampanj", platform: "Meta", status: "Active", scheduledDate: "2026-02-01", endDate: "2026-03-15", budgetType: "daily", budgetAmount: 400, creativeType: "Video", notes: "Fredagskampanj med specialerbjudande." },
        { clientName: "Kebab Dudes", adName: "TikTok Taste Test", platform: "TikTok", status: "Active", scheduledDate: "2026-02-15", endDate: "2026-03-15", budgetType: "total", budgetAmount: 7000, creativeType: "Video", notes: "Blindtest-format med kunder." },
        { clientName: "Kebab Dudes", adName: "Lunch Deal Awareness", platform: "Meta", status: "Active", scheduledDate: "2026-03-01", endDate: "2026-03-31", budgetType: "total", budgetAmount: 4500, creativeType: "Carousel", notes: "Fokus på lunchmeny med 3 rätter." },
        { clientName: "Kebab Dudes", adName: "Catering Promo", platform: "Meta", status: "Scheduled", scheduledDate: "2026-04-01", endDate: "2026-04-30", budgetType: "total", budgetAmount: 3000, creativeType: "Image", notes: "Ny cateringtjänst – B2B-fokus." },
        { clientName: "Kebab Dudes", adName: "Weekend Vibes TikTok", platform: "TikTok", status: "Active", scheduledDate: "2026-03-10", endDate: "2026-04-10", budgetType: "daily", budgetAmount: 250, creativeType: "Video", notes: "Helgstämning med musik och mat." },
        { clientName: "White Rice Asian Kitchen", adName: "Ny Ramen Lansering", platform: "Meta", status: "Scheduled", scheduledDate: "2026-03-20", endDate: "2026-04-20", budgetType: "total", budgetAmount: 9000, creativeType: "Video", notes: "Lansering av ny ramen-meny." },
        { clientName: "White Rice Asian Kitchen", adName: "Sushi Torsdag", platform: "Meta", status: "Active", scheduledDate: "2026-02-20", endDate: "2026-03-20", budgetType: "daily", budgetAmount: 350, creativeType: "Image", notes: "Torsdagskampanj – halva priset sushi." },
        { clientName: "White Rice Asian Kitchen", adName: "TikTok Matlagning Live", platform: "TikTok", status: "Scheduled", scheduledDate: "2026-04-05", endDate: "2026-04-15", budgetType: "total", budgetAmount: 4000, creativeType: "Video", notes: "Live cooking-event på TikTok." },
        { clientName: "White Rice Asian Kitchen", adName: "Takeaway Push", platform: "Meta", status: "Draft", scheduledDate: "2026-04-10", endDate: null, budgetType: "total", budgetAmount: 2500, creativeType: "Carousel", notes: "Fokus på takeaway-beställningar." },
        { clientName: "Dripp'n Burgers", adName: "Dripp'n Launch Campaign", platform: "Meta", status: "Active", scheduledDate: "2026-03-01", endDate: "2026-03-31", budgetType: "total", budgetAmount: 12000, creativeType: "Video", notes: "Stor launch-kampanj för nya restaurangen." },
        { clientName: "Dripp'n Burgers", adName: "TikTok Burger Challenge", platform: "TikTok", status: "Draft", scheduledDate: "2026-04-01", endDate: null, budgetType: "total", budgetAmount: 5000, creativeType: "Video", notes: "Challenge-format – ät störst burgare." },
        { clientName: "Dripp'n Burgers", adName: "Instagram Stories Teaser", platform: "Meta", status: "Active", scheduledDate: "2026-02-25", endDate: "2026-03-10", budgetType: "daily", budgetAmount: 300, creativeType: "Image", notes: "Teaser-kampanj inför öppning." },
      ];
      return ads.map(a => ({ ...a, id: uid(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }));
    };

    // ─── State ───
    const STORAGE_KEY = 'adbase_ads_v2';
    const loadAds = () => { try { const r = localStorage.getItem(STORAGE_KEY); if (r) { const p = JSON.parse(r); if (p.length > 0) return p; } } catch(e) {} const s = createSeedData(); localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); return s; };
    const saveAds = (ads) => localStorage.setItem(STORAGE_KEY, JSON.stringify(ads));

    function adsReducer(state, action) {
      let next;
      switch(action.type) {
        case 'ADD': next = [...state, { ...action.payload, id: uid(), createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() }]; break;
        case 'UPDATE': next = state.map(a => a.id === action.payload.id ? { ...a, ...action.payload, updatedAt: new Date().toISOString() } : a); break;
        case 'DELETE': next = state.filter(a => a.id !== action.payload); break;
        case 'UPDATE_STATUS': next = state.map(a => a.id === action.payload.id ? { ...a, status: action.payload.status, updatedAt: new Date().toISOString() } : a); break;
        default: return state;
      }
      saveAds(next);
      return next;
    }

    const Ctx = createContext();
    function Provider({ children }) {
      const [ads, dispatch] = useReducer(adsReducer, null, loadAds);
      const [page, setPage] = useState('dashboard');
      const [clientFilter, setClientFilter] = useState('all');
      const [dateRange, setDateRange] = useState({ start: '2026-01-01', end: '2026-04-30' });
      const [modalAd, setModalAd] = useState(null);
      const [selectedClient, setSelectedClient] = useState(null);
      const [toast, setToast] = useState(null);

      const showToast = useCallback((msg) => { setToast(msg); setTimeout(() => setToast(null), 2500); }, []);
      const clients = useMemo(() => [...new Set(ads.map(a => a.clientName))].sort(), [ads]);
      const filteredAds = useMemo(() => {
        let r = ads;
        if (clientFilter !== 'all') r = r.filter(a => a.clientName === clientFilter);
        if (dateRange.start && dateRange.end) { const s = new Date(dateRange.start); const e = new Date(dateRange.end); e.setHours(23,59,59); r = r.filter(a => { const sd = new Date(a.scheduledDate); return sd >= s && sd <= e; }); }
        return r;
      }, [ads, clientFilter, dateRange]);

      return <Ctx.Provider value={{ ads, dispatch, page, setPage, clientFilter, setClientFilter, dateRange, setDateRange, modalAd, setModalAd, clients, filteredAds, selectedClient, setSelectedClient, toast, showToast }}>{children}</Ctx.Provider>;
    }
    const useApp = () => useContext(Ctx);

    // ─── Shared Components ───
    function PlatformBadge({ platform, size='sm' }) {
      const cls = size === 'sm' ? 'px-2 py-0.5 text-[11px]' : 'px-2.5 py-1 text-xs';
      if (platform === 'Meta') return <span className={`inline-flex items-center gap-1 rounded-md font-semibold text-white ${cls}`} style={{background:'#0668E1'}}>Meta</span>;
      return <span className={`inline-flex items-center gap-1 rounded-md font-semibold text-white ${cls}`} style={{background:'#1a1a2e'}}>TikTok</span>;
    }

    function StatusBadge({ status, onClick }) {
      const c = STATUS_COLORS[status];
      return <span onClick={onClick} className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-[11px] font-semibold tracking-wide ${c.bg} ${c.text} ${onClick ? 'cursor-pointer hover:opacity-80 transition' : ''}`}><span className={`w-1.5 h-1.5 rounded-full ${c.dot} ${status === 'Active' ? 'pulse-dot' : ''}`}/>{status}</span>;
    }

    function Toast() {
      const { toast } = useApp();
      if (!toast) return null;
      return <div className="fixed bottom-6 right-6 z-[100] bg-gray-900 text-white px-5 py-3 rounded-xl shadow-2xl text-sm font-medium fade-in flex items-center gap-2"><I.Sparkle s={16} />{toast}</div>;
    }

    // ─── Ad Modal ───
    function AdModal() {
      const { modalAd, setModalAd, dispatch, clients, showToast } = useApp();
      const isEdit = modalAd && modalAd.id;
      const [form, setForm] = useState({ clientName: '', adName: '', platform: 'Meta', status: 'Draft', scheduledDate: '', endDate: '', budgetType: 'total', budgetAmount: '', creativeType: 'Video', notes: '' });
      const [confirmDel, setConfirmDel] = useState(false);

      useEffect(() => {

      const [platF, setPlatF] = useState('all');
      const [dragId, setDragId] = useState(null);

      const handleSort = (k) => { if (sortKey === k) setSortDir(d => d === 'asc' ? 'desc' : 'asc'); else { setSortKey(k); setSortDir('asc'); } };

      const displayed = useMemo(() => {
        let r = [...filteredAds];
        if (search) { const q = search.toLowerCase(); r = r.filter(a => a.adName.toLowerCase().includes(q) || a.notes.toLowerCase().includes(q) || a.clientName.toLowerCase().includes(q)); }
        if (statusF !== 'all') r = r.filter(a => a.status === statusF);
        if (platF !== 'all') r = r.filter(a => a.platform === platF);
        r.sort((a, b) => { let va = a[sortKey], vb = b[sortKey]; if (sortKey === 'budgetAmount') { va = Number(va)||0; vb = Number(vb)||0; } if (va < vb) return sortDir === 'asc' ? -1 : 1; if (va > vb) return sortDir === 'asc' ? 1 : -1; return 0; });
        return r;
      }, [filteredAds, search, sortKey, sortDir, statusF, platF]);

      const SH = ({ label, field, cls='' }) => (
        <th className={`text-left px-4 py-3.5 font-semibold cursor-pointer hover:text-gray-700 select-none text-[11px] uppercase tracking-wider ${cls}`} onClick={() => handleSort(field)}>
          <span className="inline-flex items-center gap-1">{label}{sortKey === field && <span className="text-brand-500">{sortDir === 'asc' ? '↑' : '↓'}</span>}</span>
        </th>
      );

      return (
        <div className="space-y-5 fade-in">
          <div className="flex items-center justify-between">
            <div>
              <h1 className="text-[28px] font-bold text-gray-900 tracking-tight">Alla annonser</h1>
              <p className="text-sm text-gray-400 mt-1">{displayed.length} av {filteredAds.length} annonser</p>
            </div>
            <div className="flex items-center gap-1.5 bg-gray-100 rounded-xl p-1">
              <button onClick={() => setView('table')} className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold transition ${view === 'table' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400 hover:text-gray-600'}`}><I.Table s={15} /> Tabell</button>
              <button onClick={() => setView('kanban')} className={`flex items-center gap-1.5 px-4 py-2 rounded-lg text-xs font-semibold transition ${view === 'kanban' ? 'bg-white shadow-sm text-gray-900' : 'text-gray-400 hover:text-gray-600'}`}><I.Kanban s={15} /> Kanban</button>
            </div>
          </div>

          {/* Filters */}
          <div className="flex items-center gap-3">
            <div className="relative flex-1">
              <span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-300"><I.Search s={16} /></span>
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Sök annons, klient eller anteckning..." className="w-full pl-10 pr-4 py-2.5 bg-white border border-gray-200 rounded-xl text-sm focus:ring-2 focus:ring-brand-500/20 focus:border-brand-500 outline-none transition" />
            </div>
            <select value={statusF} onChange={e => setStatusF(e.target.value)} className="bg-white border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 outline-none text-gray-600 font-medium">
              <option value="all">Alla status</option>{STATUSES.map(s => <option key={s} value={s}>{s}</option>)}
            </select>
            <select value={platF} onChange={e => setPlatF(e.target.value)} className="bg-white border border-gray-200 rounded-xl px-3.5 py-2.5 text-sm focus:ring-2 focus:ring-brand-500/20 outline-none text-gray-600 font-medium">
              <option value="all">Alla plattformar</option>{PLATFORMS.map(p => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>

          {view === 'table' ? (
            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
              {displayed.length === 0 ? (
                <div className="p-16 text-center"><div className="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center mx-auto mb-4 text-gray-300"><I.Search s={28} /></div><p className="text-base font-semibold text-gray-400">Inga annonser hittades</p><p className="text-sm text-gray-300 mt-1">Justera filter eller skapa en ny annons</p></div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full">
                    <thead><tr className="text-gray-400 border-b border-gray-100 bg-gray-50/50">
                      <SH label="Klient" field="clientName" />
                      <SH label="Annons" field="adName" />
                      <th className="text-left px-4 py-3.5 font-semibold text-[11px] text-gray-400 uppercase tracking-wider">Plattform</th>
                      <th className="text-left px-4 py-3.5 font-semibold text-[11px] text-gray-400 uppercase tracking-wider">Status</th>
                      <SH label="Start" field="scheduledDate" />
                      <SH label="Slut" field="endDate" />
                      <SH label="Budget" field="budgetAmount" cls="text-right" />
                      <th className="text-left px-4 py-3.5 font-semibold text-[11px] text-gray-400 uppercase tracking-wider">Format</th>
                    </tr></thead>
                    <tbody>{displayed.map(ad => (
                      <tr key={ad.id} className="border-b border-gray-50 hover:bg-brand-50/30 cursor-pointer transition group" onClick={() => setModalAd(ad)}>
                        <td className="px-4 py-3.5 text-[13px] font-semibold text-gray-900">{ad.clientName}</td>
                        <td className="px-4 py-3.5"><span className="text-[13px] text-gray-700">{ad.adName}</span></td>
                        <td className="px-4 py-3.5"><PlatformBadge platform={ad.platform} /></td>
                        <td className="px-4 py-3.5"><StatusBadge status={ad.status} /></td>
                        <td className="px-4 py-3.5 text-[13px] text-gray-500">{fmtDateSv(ad.scheduledDate)}</td>
                        <td className="px-4 py-3.5 text-[13px] text-gray-400">{fmtDateSv(ad.endDate)}</td>
                        <td className="px-4 py-3.5 text-[13px] font-bold text-gray-900 text-right">{fmtSEK(ad.budgetAmount)}</td>
                        <td className="px-4 py-3.5 text-[13px] text-gray-500">{ad.creativeType}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              )}
            </div>
          ) : (
            <div className="flex gap-3 overflow-x-auto pb-4">
              {STATUSES.map(status => {
                const cards = displayed.filter(a => a.status === status);
                const sc = STATUS_COLORS[status];
                return (
                  <div key={status} className="flex-shrink-0 w-[260px] bg-gray-50/80 rounded-2xl border border-gray-100"
                    onDragOver={e => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }}
                    onDragLeave={e => e.currentTarget.classList.remove('drag-over')}
                    onDrop={e => { e.preventDefault(); e.currentTarget.classList.remove('drag-over'); if (dragId) { dispatch({ type: 'UPDATE_STATUS', payload: { id: dragId, status } }); setDragId(null); } }}>
                    <div className="p-3.5 border-b border-gray-100 flex items-center justify-between">
                      <div className="flex items-center gap-2"><span className={`w-2.5 h-2.5 rounded-full ${sc.dot}`} /><span className="text-[13px] font-bold text-gray-700">{status}</span></div>
                      <span className="text-[11px] text-gray-400 bg-gray-200/60 px-2 py-0.5 rounded-full font-semibold">{cards.length}</span>
                    </div>
                    <div className="p-2 space-y-2 min-h-[80px]">
                      {cards.map(ad => (
                        <div key={ad.id} className="kanban-card bg-white rounded-xl p-3.5 border border-gray-100 shadow-sm hover:shadow-md transition card-hover"
                          draggable onDragStart={e => { setDragId(ad.id); e.dataTransfer.effectAllowed = 'move'; }} onClick={() => setModalAd(ad)}>
                          <p className="text-[13px] font-semibold text-gray-900 mb-1">{ad.adName}</p>
                          <p className="text-[11px] text-gray-400 mb-2.5">{ad.clientName}</p>
                          <div className="flex items-center justify-between">
                            <PlatformBadge platform={ad.platform} />
                            <span className="text-[11px] font-bold text-gray-600">{fmtSEK(ad.budgetAmount)}</span>
                          </div>
                          <p className="text-[10px] text-gray-300 mt-2 flex items-center gap-1"><I.Clock s={10} />{fmtDateSv(ad.scheduledDate)}</p>
                        </div>
                      ))}
                      {cards.length === 0 && <p className="text-[11px] text-gray-300 text-center py-6">Dra annonser hit</p>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      );
    }

    // ─── Calendar ───
    function CalendarView() {
      const { filteredAds, setModalAd, clients } = useApp();
      const [year, setYear] = useState(2026);
      const [month, setMonth] = useState(2);

      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
      const clientColorMap = useMemo(() => { const m = {}; clients.forEach((c, i) => m[c] = CLIENT_COLORS[i % CLIENT_COLORS.length]); return m; }, [clients]);

      const adsByDay = useMemo(() => {
        const m = {};
        filteredAds.forEach(ad => { const d = new Date(ad.scheduledDate); if (d.getFullYear() === year && d.getMonth() === month) { const day = d.getDate(); if (!m[day]) m[day] = []; m[day].push(ad); } });
        return m;
      }, [filteredAds, year, month]);

      const prev = () => { if (month === 0) { setMonth(11); setYear(y => y - 1); } else setMonth(m => m - 1); };
      const next = () => { if (month === 11) { setMonth(0); setYear(y => y + 1); } else setMonth(m => m + 1); };

      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(<div key={`e${i}`} className="bg-gray-50/30 rounded-xl min-h-[110px]" />);
      for (let d = 1; d <= daysInMonth; d++) {
        const dayAds = adsByDay[d] || [];
        const isToday = d === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();
        cells.push(
          <div key={d} className={`bg-white rounded-xl border ${isToday ? 'border-brand-400 ring-2 ring-brand-100' : 'border-gray-100'} min-h-[110px] p-2`}>
            <span className={`text-[11px] font-bold ${isToday ? 'text-white bg-brand-500 px-2 py-0.5 rounded-md' : 'text-gray-400'}`}>{d}</span>
            <div className="mt-1.5 space-y-1">
              {dayAds.slice(0, 3).map(ad => (
                <div key={ad.id} onClick={() => setModalAd(ad)} className="text-[10px] px-2 py-1 rounded-lg cursor-pointer truncate text-white font-semibold hover:opacity-80 transition" style={{background: clientColorMap[ad.clientName] || '#6366f1'}}>
                  {ad.adName}
                </div>
              ))}
              {dayAds.length > 3 && <span className="text-[10px] text-gray-400 pl-1">+{dayAds.length - 3} till</span>}
            </div>
          </div>
        );
      }

      return (
        <div className="space-y-5 fade-in">
          <div className="flex items-center justify-between">
            <h1 className="text-[28px] font-bold text-gray-900 tracking-tight">Kalender</h1>
            <div className="flex items-center gap-2">
              <button onClick={prev} className="p-2.5 hover:bg-gray-100 rounded-xl transition text-gray-400 hover:text-gray-600"><I.ChevL /></button>
              <span className="text-base font-bold text-gray-900 min-w-[150px] text-center">{MONTHS_FULL[month]} {year}</span>
              <button onClick={next} className="p-2.5 hover:bg-gray-100 rounded-xl transition text-gray-400 hover:text-gray-600"><I.ChevR /></button>
            </div>
          </div>

          <div className="flex flex-wrap gap-3 bg-white rounded-2xl p-3.5 border border-gray-100 shadow-sm">
            {clients.map((c, i) => <div key={c} className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 rounded-full" style={{background: CLIENT_COLORS[i % CLIENT_COLORS.length]}} /><span className="text-[11px] text-gray-500 font-medium">{c}</span></div>)}
          </div>

          <div className="bg-white rounded-2xl border border-gray-100 shadow-sm p-4">
            <div className="grid grid-cols-7 gap-1.5 mb-2">
              {DAYS_SV.map(d => <div key={d} className="text-center text-[11px] font-bold text-gray-300 uppercase tracking-wider py-2">{d}</div>)}
            </div>
            <div className="grid grid-cols-7 gap-1.5">{cells}</div>
          </div>
        </div>
      );
    }

    // ─── Clients ───
    function ClientsView() {
      const { ads, filteredAds, clients, selectedClient, setSelectedClient, setModalAd } = useApp();
      const clientColorMap = useMemo(() => { const m = {}; clients.forEach((c, i) => m[c] = CLIENT_COLORS[i % CLIENT_COLORS.length]); return m; }, [clients]);

      if (selectedClient) {
        const ca = ads.filter(a => a.clientName === selectedClient);
        const budget = ca.reduce((s, a) => s + (a.budgetAmount || 0), 0);
        const active = ca.filter(a => a.status === 'Active').length;
        const byStatus = STATUSES.map(s => ({ name: s, value: ca.filter(a => a.status === s).length })).filter(s => s.value > 0);
        const byMonth = {}; ca.forEach(a => { const d = new Date(a.scheduledDate); const k = MONTHS_SV[d.getMonth()]; byMonth[k] = (byMonth[k]||0) + (a.budgetAmount||0); });
        const monthlyData = Object.entries(byMonth).map(([name, budget]) => ({ name, budget }));

        return (
          <div className="space-y-6 fade-in">
            <div className="flex items-center gap-4">
              <button onClick={() => setSelectedClient(null)} className="p-2.5 hover:bg-gray-100 rounded-xl transition text-gray-400"><I.ArrowBack /></button>
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 rounded-2xl flex items-center justify-center text-white text-lg font-bold shadow-lg" style={{background: clientColorMap[selectedClient]}}>{selectedClient[0]}</div>
                <div>
                  <h1 className="text-2xl font-bold text-gray-900">{selectedClient}</h1>
                  <p className="text-sm text-gray-400">{ca.length} annonser · {fmtSEK(budget)}</p>
                </div>
              </div>
            </div>

            <div className="grid grid-cols-3 gap-4">
              <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm"><p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Annonser</p><p className="text-3xl font-bold text-gray-900">{ca.length}</p></div>
              <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm"><p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Aktiva</p><p className="text-3xl font-bold text-emerald-500">{active}</p></div>
              <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm"><p className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Total budget</p><p className="text-3xl font-bold text-gray-900">{fmtSEK(budget)}</p></div>
            </div>

            <div className="grid grid-cols-2 gap-4">
              <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
                <h3 className="text-sm font-bold text-gray-900 mb-4">Budget per månad</h3>
                <ResponsiveContainer width="100%" height={200}>
                  <AreaChart data={monthlyData}>
                    <defs><linearGradient id="bgrad" x1="0" y1="0" x2="0" y2="1"><stop offset="5%" stopColor={clientColorMap[selectedClient]} stopOpacity={0.15}/><stop offset="95%" stopColor={clientColorMap[selectedClient]} stopOpacity={0}/></linearGradient></defs>
                    <CartesianGrid strokeDasharray="3 3" stroke="#f1f5f9" vertical={false} />
                    <XAxis dataKey="name" tick={{fontSize: 11, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                    <YAxis tick={{fontSize: 11, fill: '#94a3b8'}} axisLine={false} tickLine={false} />
                    <RTooltip formatter={(v) => fmtSEK(v)} contentStyle={{borderRadius:'12px', border:'1px solid #e2e8f0'}} />
                    <Area type="monotone" dataKey="budget" stroke={clientColorMap[selectedClient]} fillOpacity={1} fill="url(#bgrad)" strokeWidth={2.5} />
                  </AreaChart>
                </ResponsiveContainer>
              </div>
              <div className="bg-white rounded-2xl p-5 border border-gray-100 shadow-sm">
                <h3 className="text-sm font-bold text-gray-900 mb-4">Status</h3>
                <ResponsiveContainer width="100%" height={200}>
                  <PieChart>
                    <Pie data={byStatus} cx="50%" cy="50%" outerRadius={70} innerRadius={40} dataKey="value" paddingAngle={3} label={({name, value}) => `${name} (${value})`}>
                      {byStatus.map((e, i) => <Cell key={i} fill={STATUS_COLORS[e.name]?.hex} />)}
                    </Pie>
                    <RTooltip contentStyle={{borderRadius:'12px', border:'1px solid #e2e8f0'}} />
                  </PieChart>
                </ResponsiveContainer>
              </div>
            </div>

            <div className="bg-white rounded-2xl border border-gray-100 shadow-sm overflow-hidden">
              <div className="px-6 py-4 border-b border-gray-100"><h3 className="text-sm font-bold text-gray-900">Alla annonser</h3></div>
              <table className="w-full">
                <thead><tr className="text-[11px] text-gray-400 border-b border-gray-100 bg-gray-50/50 uppercase tracking-wider">
                  <th className="text-left px-6 py-3 font-semibold">Annons</th>
                  <th className="text-left px-3 py-3 font-semibold">Plattform</th>
                  <th className="text-left px-3 py-3 font-semibold">Status</th>
                  <th className="text-left px-3 py-3 font-semibold">Datum</th>
                  <th className="text-right px-6 py-3 font-semibold">Budget</th>
                </tr></thead>
                <tbody>{ca.map(ad => (
                  <tr key={ad.id} className="border-b border-gray-50 hover:bg-brand-50/30 cursor-pointer transition" onClick={() => setModalAd(ad)}>
                    <td className="px-6 py-3.5 text-[13px] font-semibold text-gray-900">{ad.adName}</td>
                    <td className="px-3 py-3.5"><PlatformBadge platform={ad.platform} /></td>
                    <td className="px-3 py-3.5"><StatusBadge status={ad.status} /></td>
                    <td className="px-3 py-3.5 text-[13px] text-gray-500">{fmtDateSv(ad.scheduledDate)}</td>
                    <td className="px-6 py-3.5 text-[13px] text-right font-bold text-gray-900">{fmtSEK(ad.budgetAmount)}</td>
                  </tr>
                ))}</tbody>
              </table>
            </div>
          </div>
        );
      }

      // Grid
      const cc = clients.map((c, i) => {
        const ca = ads.filter(a => a.clientName === c);
        return { name: c, total: ca.length, active: ca.filter(a => a.status === 'Active').length, budget: ca.reduce((s, a) => s + (a.budgetAmount || 0), 0), meta: ca.filter(a => a.platform === 'Meta').length, tiktok: ca.filter(a => a.platform === 'TikTok').length, color: CLIENT_COLORS[i % CLIENT_COLORS.length] };
      });

      return (
        <div className="space-y-6 fade-in">
          <div><h1 className="text-[28px] font-bold text-gray-900 tracking-tight">Klienter</h1><p className="text-sm text-gray-400 mt-1">{cc.length} aktiva klienter</p></div>
          <div className="grid grid-cols-2 gap-4">
            {cc.map(c => (
              <div key={c.name} onClick={() => setSelectedClient(c.name)} className="bg-white rounded-2xl border border-gray-100 shadow-sm p-6 card-hover cursor-pointer group">
                <div className="flex items-center gap-3 mb-5">
                  <div className="w-11 h-11 rounded-2xl flex items-center justify-center text-white text-base font-bold shadow-lg" style={{background: c.color}}>{c.name[0]}</div>
                  <div className="flex-1"><h3 className="text-base font-bold text-gray-900">{c.name}</h3><p className="text-[11px] text-gray-400">{c.total} annonser</p></div>
                  <span className="text-gray-200 group-hover:text-gray-400 transition"><I.ChevR /></span>
                </div>
                <div className="grid grid-cols-3 gap-4">
                  <div><p className="text-[10px] text-gray-400 uppercase font-semibold tracking-wider mb-1">Aktiva</p><p className="text-xl font-bold text-emerald-500">{c.active}</p></div>
                  <div><p className="text-[10px] text-gray-400 uppercase font-semibold tracking-wider mb-1">Budget</p><p className="text-lg font-bold text-gray-900">{fmtSEK(c.budget)}</p></div>
                  <div><p className="text-[10px] text-gray-400 uppercase font-semibold tracking-wider mb-1">Plattformar</p>
                    <div className="flex gap-1 mt-0.5">
                      {c.meta > 0 && <span className="text-[10px] px-2 py-0.5 rounded-md text-white font-semibold" style={{background:'#0668E1'}}>{c.meta}</span>}
                      {c.tiktok > 0 && <span className="text-[10px] px-2 py-0.5 rounded-md text-white font-semibold" style={{background:'#1a1a2e'}}>{c.tiktok}</span>}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // ─── App ───
    function App() {
      const { page } = useApp();
      useEffect(() => { const h = (e) => { if (e.key === 'Escape') {} }; window.addEventListener('keydown', h); return () => window.removeEventListener('keydown', h); }, []);
      return (
        <div className="flex min-h-screen">
          <Sidebar />
          <main className="ml-[250px] flex-1 p-8 max-w-[1200px]">
            {page === 'dashboard' && <Dashboard />}
            {page === 'ads' && <AllAdsView />}
            {page === 'calendar' && <CalendarView />}
            {page === 'clients' && <ClientsView />}
          </main>
          <AdModal />
          <Toast />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Provider><App /></Provider>);
  </script>
</body>
</html>
